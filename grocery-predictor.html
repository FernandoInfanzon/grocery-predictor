// ─── Parse ────────────────────────────────────────────────────────────────────
const MONTHS = {Enero:0,Febrero:1,Marzo:2,Abril:3,Mayo:4,Junio:5,Julio:6,Agosto:7,Septiembre:8,Octubre:9,Noviembre:10,Diciembre:11};

function parseHistory(text) {
  const trips = [];
  for (const sec of text.split(/(?=COMPRA:)/g).filter(s => s.trim())) {
    const lines = sec.split("\n").map(l => l.trim()).filter(Boolean);
    if (!lines[0]?.startsWith("COMPRA:")) continue;
    const dm = lines[0].match(/(\d{1,2})\s+([A-Za-záéíóú]+)\s+(\d{4})/);
    if (!dm || MONTHS[dm[2]] === undefined) continue;
    const date  = new Date(+dm[3], MONTHS[dm[2]], +dm[1]);
    const total = parseFloat((lines[0].match(/\$([0-9.]+)/) || [,0])[1]);
    const items = [];
    for (const part of lines.slice(1).join(" ").split(",")) {
      const m = part.trim().match(/^(.+?)\s+x(\d+)$/i);
      if (m) items.push({ name: m[1].trim(), qty: +m[2] });
    }
    if (items.length) trips.push({ date, total, items });
  }
  return trips.sort((a, b) => a.date - b.date);
}

function categorize(n) {
  n = n.toLowerCase();
  if (/(milk|cream cheese|cheese|yogurt|butter|mozzarella|cheddar|parmesan|havarti|lactose)/i.test(n)) return "lacteos";
  if (/(chicken|beef|pork|ham|bacon|turkey|hot dog|hotdog|sausage|meatball|carnitas|rib|wing|steak)/i.test(n)) return "carnes";
  if (/(cola|juice|water|sparkling|sport drink|punch|milkshake|electrolyte|beverage)/i.test(n)) return "bebidas";
  if (/(frozen|pizza|waffle|potsticker|dumpling|lasagna|alfredo|bolognese|ice cream|mochi)/i.test(n)) return "congelados";
  if (/(chip|cookie|granola bar|candy|gummy|snack|cracker|puffs|brownie|pretzel)/i.test(n)) return "snacks";
  if (/(tissue|toilet|bathroom|detergent|softener|soap|shampoo|toothpaste|toothbrush|deodorant|cleaner|dishwasher|kitchen bag|dryer|cloth)/i.test(n)) return "hogar";
  if (/(apple|banana|strawberr|cucumber|tomato|lime|lemon|grape|peach|avocado|potato|zucchini|spinach|pepper|onion|kiwi|raspberr|orange|mango|tomatillo|cilantro|carrot|squash|dill)/i.test(n)) return "frutas_verduras";
  return "despensa";
}

// ─── Forecast ────────────────────────────────────────────────────────────────
function buildForecast(trips, nextTripDate, overrides, catOvr, manuals, forcedKeys) {
  const products = {};
  for (const trip of trips)
    for (const item of trip.items) {
      const k = item.name.toLowerCase().trim();
      if (!products[k]) products[k] = { name: item.name, qty: item.qty, dates: {} };
      products[k].dates[trip.date.toDateString()] = trip.date;
      products[k].qty = item.qty;
    }

  const result = [];

  const processItem = (name, qty, baseInterval, calcInterval, lastDate, isManual, count, forceOverride = false) => {
    const k = name.toLowerCase().trim();
    const interval = overrides[k] || baseInterval;
    const gap = (nextTripDate - lastDate) / 86400000;
    if (gap < 0) return;
    const cycles = Math.floor(gap / interval);
    const projLast = new Date(lastDate.getTime() + cycles * interval * 86400000);
    const nextDue  = new Date(projLast.getTime() + interval * 86400000);
    const daysToDue = (nextDue - nextTripDate) / 86400000;
    const forced = forceOverride || !!forcedKeys[k];
    if (daysToDue > 7 && !forced) return;
    result.push({
      name, qty,
      urgency:   forced && daysToDue > 7 ? "baja" : daysToDue <= 2 ? "alta" : daysToDue <= 5 ? "media" : "baja",
      category:  catOvr[k] || categorize(name),
      frequency_label: interval <= 9 ? "Weekly" : interval <= 18 ? "Biweekly" : interval <= 40 ? "Monthly" : "Occasional",
      avgInterval: Math.round(interval),
      calcInterval: Math.round(calcInterval),
      daysToDue: Math.round(daysToDue),
      purchaseCount: count,
      lastPurchased: projLast.toLocaleDateString("en-CA", {day:"numeric",month:"short"}),
      itemKey: k,
      isOverridden: !!overrides[k],
      isCatOvr: !!catOvr[k],
      isManual,
      isForced: forced && daysToDue > 7,
    });
  };

  for (const d of Object.values(products)) {
    const dates = Object.values(d.dates).sort((a,b) => a-b);
    if (dates.length < 2) continue;
    const itvs = [];
    for (let i = 1; i < dates.length; i++) itvs.push((dates[i]-dates[i-1])/86400000);
    const calc = itvs.reduce((a,b)=>a+b)/itvs.length;
    processItem(d.name, d.qty, calc, calc, dates[dates.length-1], false, dates.length);
  }
  for (const mp of (manuals||[]))
    processItem(mp.name, mp.qty, mp.intervalDays, mp.intervalDays, new Date(mp.addedDate), true, 0, !!mp.showInList);

  return result.sort((a,b) => {
    const o={alta:0,media:1,baja:2};
    return o[a.urgency]!==o[b.urgency] ? o[a.urgency]-o[b.urgency] : a.category.localeCompare(b.category);
  });
}

function getAllTracked(trips, overrides, catOvr) {
  const products = {};
  for (const trip of trips)
    for (const item of trip.items) {
      const k = item.name.toLowerCase().trim();
      if (!products[k]) products[k] = { name:item.name, qty:item.qty, dates:{} };
      products[k].dates[trip.date.toDateString()] = trip.date;
      products[k].qty = item.qty;
    }
  return Object.values(products)
    .filter(p => Object.keys(p.dates).length >= 2)
    .map(p => {
      const dates = Object.values(p.dates).sort((a,b)=>a-b);
      const itvs = [];
      for (let i=1;i<dates.length;i++) itvs.push((dates[i]-dates[i-1])/86400000);
      const calc = Math.round(itvs.reduce((a,b)=>a+b)/itvs.length);
      const k = p.name.toLowerCase().trim();
      return { name:p.name, key:k, qty:p.qty, calc,
        interval: overrides[k]||calc, category: catOvr[k]||categorize(p.name),
        count: Object.keys(p.dates).length, isOverridden:!!overrides[k], isCatOvr:!!catOvr[k] };
    }).sort((a,b)=>b.count-a.count);
}

function GroceryApp() {
  const [historyText,   setHistoryText]   = useState(INITIAL_HISTORY);
  const [nextTripDateStr, setNextTripDateStr] = useState("");
  const [checked,       setChecked]       = useState({});       // {itemKey: bool}
  const [tab,           setTab]           = useState("lista");
  const [newText,       setNewText]       = useState("");
  const [overrides,     setOverrides]     = useState({});       // {key: days}
  const [catOvr,        setCatOvr]        = useState({});       // {key: cat}
  const [manuals,       setManuals]       = useState([]);
  const [tripQty,       setTripQty]       = useState({});       // {key: qty} session only
  const [forcedInList,  setForcedInList]  = useState({});       // {key: true} persisted
  const [removedFromList, setRemovedFromList] = useState({});   // {key: true} session only
  const [confirmRemove, setConfirmRemove] = useState(null);     // itemKey
  // Edit state
  const [editingKey,    setEditingKey]    = useState(null);
  const [editInterval,  setEditInterval]  = useState("");
  const [editCat,       setEditCat]       = useState("");
  const [editQty,       setEditQty]       = useState("");
  const [editIsManual,  setEditIsManual]  = useState(false);
  // Add form
  const [addForm,       setAddForm]       = useState({name:"",days:"7",qty:"1",cat:"otro",addToList:false});
  const [addError,      setAddError]      = useState("");
  const [searchQuery,   setSearchQuery]   = useState("");
  const [showAddForm,   setShowAddForm]   = useState(false);
  const [showBackup,    setShowBackup]    = useState(false);
  const [backupText,    setBackupText]    = useState("");
  const [restoreText,   setRestoreText]   = useState("");
  const [restoreMsg,    setRestoreMsg]    = useState("");
  // Export
  const [exportText,    setExportText]    = useState("");
  const exportRef = useRef(null);

  // CSS injected via <style> tag in HTML

  useEffect(() => {
    (async () => {
      try { const r = await storage.get(HISTORY_KEY);   if (r) setHistoryText(r.value); } catch {}
      try { const r = await storage.get(OVERRIDES_KEY); if (r) setOverrides(JSON.parse(r.value)); } catch {}
      try { const r = await storage.get(CAT_KEY);       if (r) setCatOvr(JSON.parse(r.value)); } catch {}
      try { const r = await storage.get(MANUAL_KEY);    if (r) setManuals(JSON.parse(r.value)); } catch {}
      try { const r = await storage.get(FORCED_KEY);    if (r) setForcedInList(JSON.parse(r.value)); } catch {}
    })();
  }, []);

  const trips   = useMemo(() => parseHistory(historyText), [historyText]);
  const tracked = useMemo(() => getAllTracked(trips, overrides, catOvr), [trips, overrides, catOvr]);

  const defaultNextTrip = useMemo(() => {
    const today = new Date(); today.setHours(12,0,0,0);
    const big = trips.filter(t => t.total > 100);
    if (!big.length) return today;
    const calc = new Date(big[big.length-1].date.getTime() + 7*86400000);
    return calc > today ? calc : today;
  }, [trips]);

  useEffect(() => {
    if (!nextTripDateStr && defaultNextTrip)
      setNextTripDateStr(defaultNextTrip.toISOString().slice(0,10));
  }, [defaultNextTrip]);

  const nextTripDate = useMemo(() =>
    nextTripDateStr ? new Date(nextTripDateStr+"T12:00:00") : defaultNextTrip,
    [nextTripDateStr, defaultNextTrip]);

  const rawForecast = useMemo(() =>
    buildForecast(trips, nextTripDate, overrides, catOvr, manuals, forcedInList),
    [trips, nextTripDate, overrides, catOvr, manuals, forcedInList]);

  const forecast = useMemo(() =>
    rawForecast.filter(i => !removedFromList[i.itemKey]),
    [rawForecast, removedFromList]);

  const grouped = useMemo(() => forecast.reduce((acc, item) => {
    const c = item.category || "otro";
    if (!acc[c]) acc[c] = [];
    acc[c].push(item);
    return acc;
  }, {}), [forecast]);

  const forecastKeys  = useMemo(() => new Set(forecast.map(i => i.itemKey)), [forecast]);
  const checkedCount  = Object.values(checked).filter(Boolean).length;
  const altaCount     = forecast.filter(i => i.urgency === "alta").length;
  const mediaCount    = forecast.filter(i => i.urgency === "media").length;
  const bigTrips      = trips.filter(t => t.total > 100).length;

  const toggle = key => setChecked(p => ({...p, [key]: !p[key]}));

  const adjustQty = (key, baseQty, delta) => {
    const cur = tripQty[key] ?? baseQty;
    if (cur + delta < 1) { setConfirmRemove(key); return; }
    setTripQty(p => ({...p, [key]: cur + delta}));
  };

  const confirmRemoveItem = key => {
    setRemovedFromList(p => ({...p, [key]: true}));
    setTripQty(p => { const u={...p}; delete u[key]; return u; });
    setConfirmRemove(null);
  };

  const reAddItem = key => {
    setRemovedFromList(p => { const u={...p}; delete u[key]; return u; });
  };

  const forceAddItem = async key => {
    const u = {...forcedInList, [key]: true};
    setForcedInList(u);
    setRemovedFromList(p => { const r={...p}; delete r[key]; return r; });
    try { await storage.set(FORCED_KEY, JSON.stringify(u)); } catch {}
  };

  const openEdit = (key, interval, cat, qty, isManual) => {
    setEditingKey(key); setEditInterval(String(interval));
    setEditCat(cat || ""); setEditQty(String(qty||1)); setEditIsManual(!!isManual);
  };

  const saveEdit = async () => {
    if (!editingKey) return;
    if (editIsManual) {
      const updated = manuals.map(mp =>
        mp.name.toLowerCase().trim() === editingKey
          ? {...mp, intervalDays: +editInterval||mp.intervalDays, category: editCat||mp.category, qty: +editQty||mp.qty}
          : mp
      );
      setManuals(updated);
      try { await storage.set(MANUAL_KEY, JSON.stringify(updated)); } catch {}
    } else {
      if (+editInterval > 0) {
        const u = {...overrides, [editingKey]: +editInterval};
        setOverrides(u);
        try { await storage.set(OVERRIDES_KEY, JSON.stringify(u)); } catch {}
      }
      if (editCat) {
        const u = {...catOvr, [editingKey]: editCat};
        setCatOvr(u);
        try { await storage.set(CAT_KEY, JSON.stringify(u)); } catch {}
      }
    }
    setEditingKey(null);
  };

  const clearEdit = async key => {
    const u = {...overrides}; delete u[key]; setOverrides(u);
    const uc = {...catOvr}; delete uc[key]; setCatOvr(uc);
    try { await storage.set(OVERRIDES_KEY, JSON.stringify(u)); } catch {}
    try { await storage.set(CAT_KEY, JSON.stringify(uc)); } catch {}
    setEditingKey(null);
  };

  const addManual = () => {
    if (!addForm.name.trim()) { setAddError("Name required"); return; }
    const mp = {name:addForm.name.trim(), intervalDays:+addForm.days||7,
                qty:+addForm.qty||1, category:addForm.cat,
                addedDate: new Date().toISOString().slice(0,10),
                showInList: !!addForm.addToList};
    const updatedManuals = [...manuals, mp];
    // All state in one batch
    setManuals(updatedManuals);
    setAddForm({name:"",days:"7",qty:"1",cat:"otro",addToList:false});
    setAddError("");
    if (addForm.addToList) setTab("lista");
    storage.set(MANUAL_KEY, JSON.stringify(updatedManuals)).catch(()=>{});
  };

  const removeManual = async name => {
    const updated = manuals.filter(p => p.name !== name); setManuals(updated);
    const k = name.toLowerCase().trim();
    const uf = {...forcedInList}; delete uf[k]; setForcedInList(uf);
    try { await storage.set(MANUAL_KEY, JSON.stringify(updated)); } catch {}
    try { await storage.set(FORCED_KEY, JSON.stringify(uf)); } catch {}
  };

  const toggleManualInList = (name) => {
    const k = name.toLowerCase().trim();
    const updated = manuals.map(mp =>
      mp.name.toLowerCase().trim() === k ? {...mp, showInList: !mp.showInList} : mp
    );
    setManuals(updated);
    storage.set(MANUAL_KEY, JSON.stringify(updated)).catch(()=>{});
  };

  const exportBackup = () => {
    const data = JSON.stringify({
      v: 1,
      history: historyText,
      manuals,
      overrides,
      catOvr,
      forcedInList,
    }, null, 2);
    setBackupText(data);
    if (copyWithExecCommand(data)) {
      setRestoreMsg("__copied__");
      setTimeout(() => setRestoreMsg(""), 2500);
    }
  };

  const importBackup = async () => {
    try {
      const data = JSON.parse(restoreText);
      if (!data.v || !data.history) { setRestoreMsg("Invalid format"); return; }
      setHistoryText(data.history);
      if (data.manuals)     setManuals(data.manuals);
      if (data.overrides)   setOverrides(data.overrides);
      if (data.catOvr)      setCatOvr(data.catOvr);
      if (data.forcedInList) setForcedInList(data.forcedInList);
      await storage.set(HISTORY_KEY,   data.history).catch(()=>{});
      await storage.set(MANUAL_KEY,    JSON.stringify(data.manuals||[])).catch(()=>{});
      await storage.set(OVERRIDES_KEY, JSON.stringify(data.overrides||{})).catch(()=>{});
      await storage.set(CAT_KEY,       JSON.stringify(data.catOvr||{})).catch(()=>{});
      await storage.set(FORCED_KEY,    JSON.stringify(data.forcedInList||{})).catch(()=>{});
      setRestoreText("");
      setRestoreMsg("Data restored successfully");
      setTimeout(() => setRestoreMsg(""), 3000);
    } catch {
      setRestoreMsg("Error reading backup");
    }
  };

  const addPurchase = async () => {
    if (!newText.trim()) return;
    const updated = newText.trim() + "\n\n" + historyText;
    setHistoryText(updated);
    try { await storage.set(HISTORY_KEY, updated); } catch {}
    setNewText(""); setTab("lista");
  };

  const buildListText = () => {
    let text = "Grocery list - ";
    text += nextTripDate.toLocaleDateString("en-CA",{weekday:"long",day:"numeric",month:"long"}) + "\n\n";
    const g = forecast.reduce((acc, item) => {
      const lbl = CATS[item.category]?.label || "Otros";
      if (!acc[lbl]) acc[lbl] = [];
      acc[lbl].push(item);
      return acc;
    }, {});
    for (const [cat, items] of Object.entries(g)) {
      text += cat.toUpperCase() + "\n";
      for (const item of items) {
        const q = tripQty[item.itemKey] ?? item.qty;
        text += `  ${checked[item.itemKey] ? "✓ " : ""}${item.name}${q > 1 ? " x"+q : ""}\n`;
      }
      text += "\n";
    }
    return text;
  };

  const copyWithExecCommand = (text) => {
    const el = document.createElement("textarea");
    el.value = text;
    el.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0;";
    document.body.appendChild(el);
    el.focus(); el.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(el);
    return ok;
  };

  const generateExport = async () => {
    const text = buildListText();
    if (navigator.share) {
      try { await navigator.share({ title:"Grocery list", text }); return; }
      catch(e) { if (e.name==="AbortError") return; }
    }
    if (copyWithExecCommand(text)) {
      setExportText("__copied__"); setTimeout(()=>setExportText(""),2500); return;
    }
    try {
      await navigator.clipboard.writeText(text);
      setExportText("__copied__"); setTimeout(()=>setExportText(""),2500); return;
    } catch {}
    setExportText(text);
    setTimeout(()=>{ exportRef.current?.select(); }, 50);
  };;

  const tabStyle = id => ({
    flex:1, padding:"8px 4px", border:"none",
    background: tab===id ? "#1A4731" : "none", borderRadius:10,
    fontSize:12, fontWeight: tab===id ? 500 : 400, cursor:"pointer",
    color: tab===id ? "white" : "#64748B", fontFamily:"'Outfit',sans-serif",
    display:"flex", alignItems:"center", justifyContent:"center", gap:4,
  });

  // Shared edit panel component
  const EditPanel = ({item}) => (
    <div className="ga-edit-panel">
      <div style={{fontSize:13,fontWeight:600,color:"#1E293B",marginBottom:10}}>
        {item.name}
        {item.isManual && <span style={{fontSize:11,color:"#94A3B8",marginLeft:6}}>manual</span>}
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#64748B",marginBottom:6}}>Purchase frequency:</div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#475569"}}>Cada</span>
          <input type="number" min="1" max="365" value={editInterval}
            onChange={e=>setEditInterval(e.target.value)}
            style={{width:56,padding:"5px 8px",borderRadius:8,border:"1px solid #CBD5E1",fontSize:14,fontFamily:"Outfit,sans-serif",textAlign:"center"}} />
          <span style={{fontSize:13,color:"#475569"}}>dias</span>
          {[7,14,21,30].map(d=>(
            <button key={d} onClick={()=>setEditInterval(String(d))}
              style={{padding:"4px 9px",borderRadius:8,border:"1px solid",borderColor:editInterval===String(d)?"#1A4731":"#CBD5E1",background:editInterval===String(d)?"#1A4731":"white",color:editInterval===String(d)?"white":"#475569",fontSize:12,cursor:"pointer",fontFamily:"Outfit,sans-serif"}}>
              {d}d
            </button>
          ))}
        </div>
        {!item.isManual && <div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>Calculado: c/{item.calcInterval}d</div>}
      </div>
      {item.isManual && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:"#64748B",marginBottom:4}}>Typical qty:</div>
          <input type="number" min="1" value={editQty} onChange={e=>setEditQty(e.target.value)}
            style={{width:70,padding:"6px 10px",borderRadius:8,border:"1px solid #CBD5E1",fontSize:14,fontFamily:"Outfit,sans-serif",textAlign:"center"}} />
        </div>
      )}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#64748B",marginBottom:6}}>Category:</div>
        <div className="ga-cat-grid">
          {Object.entries(CATS).map(([k,cf])=>(
            <button key={k} onClick={()=>setEditCat(k)} className="ga-cat-chip"
              style={{background:editCat===k?cf.bg:"white",color:editCat===k?cf.fg:"#64748B",borderColor:editCat===k?cf.fg:"#E2E8F0"}}>
              <i className={`ti ${cf.icon}`} style={{marginRight:3,fontSize:10}} aria-hidden="true"></i>
              {cf.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={saveEdit}
          style={{padding:"7px 16px",background:"#1A4731",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"Outfit,sans-serif"}}>
          Save
        </button>
        {!item.isManual && (item.isOverridden || item.isCatOvr) && (
          <button onClick={()=>clearEdit(editingKey)} className="ga-btn-del">Quitar ajuste</button>
        )}
        <button onClick={()=>setEditingKey(null)} className="ga-btn-sec" style={{marginLeft:"auto"}}>Cancel</button>
      </div>
    </div>
  );

  return (
    <div className="ga">
      {/* Header */}
      <div className="ga-header">
        <h2 className="ga-h1">
          <i className="ti ti-shopping-cart" aria-hidden="true" style={{fontSize:20}}></i>Lista Inteligente
        </h2>
        <p className="ga-sub">{bigTrips} trips · {tracked.length} tracked · {forecast.length} in list</p>
        <div className="ga-date-row">
          <span className="ga-date-label"><i className="ti ti-calendar" aria-hidden="true" style={{marginRight:4,fontSize:13}}></i>Shopping on:</span>
          <input type="date" className="ga-date-input" value={nextTripDateStr}
            onChange={e=>{ setNextTripDateStr(e.target.value); setChecked({}); setTripQty({}); setRemovedFromList({}); setConfirmRemove(null); }} />
        </div>
      </div>

      <div className="ga-inner">
        {/* Tabs */}
        <div style={{display:"flex",background:"white",borderRadius:14,padding:4,border:"1px solid #E2E8F0",gap:3,marginTop:-20,marginBottom:20}}>

              <p style={{color:"#64748B",fontSize:15}}>No urgent items. Change the date or add products.</p>
            </div>

                  <i className={`ti ${exportText==="__copied__" ? "ti-check" : navigator?.share ? "ti-share" : "ti-copy"}`} aria-hidden="true" style={{fontSize:14}}></i>

              <div className="ga-prog-bar">
                <div className="ga-prog-fill" style={{width:`${forecast.length?Math.round(checkedCount/forecast.length*100):0}%`}} />
              </div>

            {/* Export panel - fallback when copy APIs unavailable */}

                <p style={{fontSize:12,color:"#64748B",margin:"0 0 10px"}}>

                <textarea ref={exportRef} readOnly value={exportText}
                  onClick={e=>e.target.select()}
                  className="ga-textarea" style={{minHeight:180,fontSize:12}}

                <button onClick={()=>{ if(exportRef.current){ exportRef.current.select(); copyWithExecCommand(exportRef.current.value); setExportText("__copied__"); setTimeout(()=>setExportText(""),2500); }}}
                  className="ga-btn" style={{width:"100%",marginTop:10,padding:"10px"}}>
                  <i className="ti ti-copy" aria-hidden="true" style={{fontSize:15}}></i>
                  Try copying again
                </button>
              </div>
            )}

            {Object.entries(grouped).map(([cat,catItems])=>{
              const cf = CATS[cat]||CATS.otro;
              const visible = catItems.filter(i=>!checked[i.itemKey]);
              if (!visible.length) return null;
              return (
                <div key={cat}>
                  <div className="ga-cat-hdr">
                    <span className="ga-cat-pill" style={{background:cf.bg,color:cf.fg}}>
                      <i className={`ti ${cf.icon}`} aria-hidden="true" style={{fontSize:12}}></i>{cf.label}
                    </span>
                    <span style={{fontSize:12,color:"#94A3B8"}}>{visible.length}</span>
                  </div>
                  <div className="ga-card">
                    {catItems.map(item=>{
                      const done = !!checked[item.itemKey];
                      const ug   = URG[item.urgency]||URG.baja;
                      const qty  = tripQty[item.itemKey] ?? item.qty;
                      const dueText = item.isForced ? "added" : item.daysToDue<=0 ? `overdue ${Math.abs(item.daysToDue)}d` : `in ${item.daysToDue}d`;
                      const isEditing = editingKey===item.itemKey;
                      return (
                        <div key={item.itemKey} style={{borderBottom:"1px solid #F1F5F9"}}>
                          {isEditing ? <EditPanel item={item} /> : (
                            <>
                              <div className={`ga-row${done?" done":""}`} style={{borderBottom:"none"}} onClick={()=>toggle(item.itemKey)}>
                                <div className={`ga-check${done?" on":""}`}>
                                  {done && <i className="ti ti-check" aria-hidden="true" style={{fontSize:12,color:"white"}}></i>}
                                </div>
                                <div style={{flex:1,minWidth:0}}>
                                  <div className="ga-name" style={{textDecoration:done?"line-through":"none"}}>
                                    {item.name}
                                    {item.isOverridden && <span style={{fontSize:10,color:"#F59E0B",marginLeft:4}}>✎</span>}
                                    {item.isManual && <span style={{fontSize:10,color:"#94A3B8",marginLeft:4}}>manual</span>}
                                  </div>
                                  <div className="ga-meta">{item.frequency_label} · ev/{item.avgInterval}d · {dueText}</div>
                                </div>
                                <div className="ga-qty-ctrl" onClick={e=>e.stopPropagation()}>
                                  <button className="ga-qty-btn" onClick={()=>adjustQty(item.itemKey,item.qty,-1)}>−</button>
                                  <span className="ga-qty-val">{qty}</span>
                                  <button className="ga-qty-btn" onClick={()=>adjustQty(item.itemKey,item.qty,+1)}>+</button>
                                </div>
                                <span className="ga-badge" style={{background:ug.bg,color:ug.fg}}>
                                  <span className="ga-dot" style={{background:ug.dot}}></span>{ug.label}
                                </span>
                                <button onClick={e=>{e.stopPropagation();openEdit(item.itemKey,item.avgInterval,item.category,item.qty,item.isManual);}}
                                  className="ga-edit-btn">
                                  <i className="ti ti-pencil" aria-hidden="true" style={{fontSize:12}}></i>editar
                                </button>
                              </div>
                              {confirmRemove===item.itemKey && (
                                <div className="ga-confirm">
                                  <span style={{fontSize:13,color:"#92400E",flex:1}}>¿Quitar de la lista?</span>
                                  <button onClick={()=>confirmRemoveItem(item.itemKey)}
                                    style={{padding:"5px 12px",background:"#EF4444",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"Outfit,sans-serif"}}>
                                    Quitar
                                  </button>
                                  <button onClick={()=>{setTripQty(p=>({...p,[item.itemKey]:1}));setConfirmRemove(null);}}
                                    className="ga-btn-sec" style={{padding:"5px 12px",fontSize:12}}>
                                    Cancel
                                  </button>
                                </div>
                              )}
                            </>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* ─── PRODUCTOS ─── */}
        {tab==="productos" && (
          <>
            {/* Search + Add button row */}
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <div style={{position:"relative",flex:1}}>
                <i className="ti ti-search" aria-hidden="true" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#94A3B8",fontSize:15,pointerEvents:"none"}}></i>
                <input className="ga-input" style={{paddingLeft:36}} placeholder="Search product..."
                  value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
              </div>
              <button onClick={()=>setShowAddForm(p=>!p)}
                style={{padding:"9px 14px",background:showAddForm?"#E2E8F0":"#1A4731",color:showAddForm?"#475569":"white",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"Outfit,sans-serif",whiteSpace:"nowrap",flexShrink:0}}>
                {showAddForm ? "× Close" : "+ New"}
              </button>
            </div>

            {/* Collapsible add form at top */}
            {showAddForm && (
              <div className="ga-add-form" style={{marginBottom:16}}>
                <div style={{fontSize:14,fontWeight:600,color:"#1E293B",marginBottom:14}}>Add product</div>
                <div className="ga-field">
                  <label>Name</label>
                  <input className="ga-input" placeholder="Ej. Aceite de oliva" value={addForm.name}
                    onChange={e=>setAddForm(p=>({...p,name:e.target.value}))} />
                  {addError && <div style={{fontSize:12,color:"#EF4444",marginTop:4}}>{addError}</div>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  <div className="ga-field" style={{margin:0}}>
                    <label>Frequency (days)</label>
                    <input className="ga-input" type="number" min="1" value={addForm.days}
                      onChange={e=>setAddForm(p=>({...p,days:e.target.value}))} />
                  </div>
                  <div className="ga-field" style={{margin:0}}>
                    <label>Typical qty</label>
                    <input className="ga-input" type="number" min="1" value={addForm.qty}
                      onChange={e=>setAddForm(p=>({...p,qty:e.target.value}))} />
                  </div>
                </div>
                <div className="ga-field">
                  <label>Categoria</label>
                  <div className="ga-cat-grid">
                    {Object.entries(CATS).map(([k,cf])=>(
                      <button key={k} onClick={()=>setAddForm(p=>({...p,cat:k}))} className="ga-cat-chip"
                        style={{background:addForm.cat===k?cf.bg:"white",color:addForm.cat===k?cf.fg:"#64748B",borderColor:addForm.cat===k?cf.fg:"#E2E8F0"}}>
                        <i className={`ti ${cf.icon}`} style={{marginRight:3,fontSize:10}} aria-hidden="true"></i>{cf.label}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="ga-check-row">
                  <input type="checkbox" id="addToList" checked={addForm.addToList}
                    onChange={e=>setAddForm(p=>({...p,addToList:e.target.checked}))}
                    style={{width:18,height:18,accentColor:"#1A4731",cursor:"pointer"}} />
                  <label htmlFor="addToList" style={{fontSize:14,color:"#1E293B",cursor:"pointer"}}>

                  </label>
                </div>
                <button className="ga-btn" style={{width:"100%",marginTop:8}} onClick={()=>{ addManual(); setShowAddForm(false); }}>
                  <i className="ti ti-plus" aria-hidden="true" style={{fontSize:15}}></i>
                  {addForm.addToList ? "Add and view in list" : "Add product"}
                </button>
              </div>

            {/* Product lists */}
            {(()=>{
              const q = searchQuery.toLowerCase().trim();

              const filtM = q ? manuals.filter(mp=>mp.name.toLowerCase().includes(q)) : manuals;
              const noResults = q && filtT.length===0 && filtM.length===0;
              return (<>
                {noResults && (
                  <div style={{textAlign:"center",padding:"24px 0",color:"#94A3B8",fontSize:14}}>

                {filtT.length > 0 && (
                  <>
                    <div style={{fontSize:13,color:"#64748B",marginBottom:12}}>
                      {filtT.length}{q?` of ${tracked.length}`:""} tracked from history
                    </div>
                    {Object.entries(
                      filtT.reduce((acc,p)=>{ const cat=p.category||"otro"; if(!acc[cat])acc[cat]=[]; acc[cat].push(p); return acc; },{})
                    ).map(([cat, catItems])=>{
                      const cf = CATS[cat]||CATS.otro;

                        <div key={cat} style={{marginBottom:12}}>

                                    <div className="ga-tracked-row">

                                        <div style={{fontSize:11,color:"#94A3B8"}}>ev/{p.interval}d · {p.count} purchases</div>

                              return (
                                <div key={mp.name} style={{borderBottom:i<catItems.length-1?"1px solid #F1F5F9":"none"}}>
                                  {isEditing ? <EditPanel item={{name:mp.name,itemKey:k,isManual:true,isOverridden:false,isCatOvr:false,calcInterval:mp.intervalDays,avgInterval:mp.intervalDays,qty:mp.qty,category:mp.category}} /> : (
                                    <div className="ga-tracked-row">
                                      <div style={{flex:1,minWidth:0}}>
                                        <div style={{fontSize:13,fontWeight:500,color:"#1E293B"}}>{mp.name}</div>
                                        <div style={{fontSize:11,color:"#94A3B8"}}>ev/{mp.intervalDays}d · qty {mp.qty}</div>
                                      </div>
                                      <button onClick={()=>toggleManualInList(mp.name)}
                                        style={{padding:"4px 10px",borderRadius:20,border:"1px solid",borderColor:inList?"#6EE7B7":"#CBD5E1",background:inList?"#D1FAE5":"white",color:inList?"#064E3B":"#64748B",fontSize:11,cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:500,flexShrink:0}}>
                                        {inList?"✓ In list":"+ This trip"}
                                      </button>
                                      <button onClick={()=>openEdit(k,mp.intervalDays,mp.category,mp.qty,true)} className="ga-edit-btn">
                                        <i className="ti ti-pencil" aria-hidden="true" style={{fontSize:12}}></i>editar
                                      </button>
                                      <button onClick={()=>removeManual(mp.name)} className="ga-btn-del">
                                        <i className="ti ti-trash" aria-hidden="true" style={{fontSize:12}}></i> Delete
                                      </button>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </>
                )}
              </>);
            })()}
          </>
        )}
        {/* ─── HISTORIAL ─── */}
        {tab==="historial" && (
          <div>
            {[...trips].reverse().map((trip,i)=>{
              const isSmall = trip.total < 100;
              const ds = trip.date.toLocaleDateString("en-CA",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
              return (
                <div key={i} className="ga-history-row">
                  <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,marginTop:5,background:isSmall?"#CBD5E1":"#1A4731"}} />
                  <div>
                    <div style={{fontSize:14,fontWeight:500,color:"#1E293B"}}>{ds}</div>
                    <div style={{fontSize:13,color:"#64748B",marginTop:2}}>
                      ${trip.total.toFixed(2)} · {trip.items.length} items
                      {isSmall&&<span style={{marginLeft:8,fontSize:11,color:"#94A3B8"}}>quick trip</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ─── AGREGAR ─── */}
        {tab==="agregar" && (
          <div>
            {/* Backup/Restore section */}
            <div style={{background:"white",borderRadius:14,border:"1px solid #E2E8F0",marginBottom:16,overflow:"hidden"}}>
              <button onClick={()=>setShowBackup(p=>!p)}
                style={{width:"100%",padding:"12px 16px",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"Outfit,sans-serif"}}>
                <span style={{fontSize:14,fontWeight:600,color:"#1E293B",display:"flex",alignItems:"center",gap:8}}>
                  <i className="ti ti-database" aria-hidden="true" style={{fontSize:15,color:"#64748B"}}></i>
                  Data backup
                </span>
                <i className={`ti ${showBackup?"ti-chevron-up":"ti-chevron-down"}`} style={{fontSize:14,color:"#94A3B8"}} aria-hidden="true"></i>
              </button>
              {showBackup && (
                <div style={{padding:"0 16px 16px",borderTop:"1px solid #F1F5F9"}}>
                  <p style={{fontSize:13,color:"#64748B",margin:"12px 0 10px",lineHeight:1.5}}>
                    Export your data before any app update. Save the text in Notes or send it to yourself via WhatsApp.
                  </p>
                  <button onClick={exportBackup} className="ga-btn" style={{width:"100%",marginBottom:8}}>
                    <i className="ti ti-download" aria-hidden="true" style={{fontSize:15}}></i>
                    Exportar mis datos
                  </button>
                  {backupText && (
                    <textarea readOnly value={backupText} onClick={e=>e.target.select()}
                      className="ga-textarea" style={{minHeight:80,fontSize:11,marginBottom:8}}/>
                  )}
                  {restoreMsg && restoreMsg !== "__copied__" && (
                    <div style={{fontSize:13,color: restoreMsg.includes("correctamente")?"#064E3B":"#EF4444",padding:"8px 12px",borderRadius:8,background: restoreMsg.includes("correctamente")?"#D1FAE5":"#FEE2E2",marginBottom:8}}>
                      {restoreMsg}
                    </div>
                  )}
                  <div style={{borderTop:"1px solid #F1F5F9",paddingTop:12,marginTop:4}}>
                    <div style={{fontSize:12,color:"#64748B",marginBottom:6}}>Restore from backup:</div>
                    <textarea value={restoreText} onChange={e=>setRestoreText(e.target.value)}
                      className="ga-textarea" style={{minHeight:80,fontSize:11}} placeholder="Paste your JSON backup here..." />
                    <button onClick={importBackup} disabled={!restoreText.trim()}
                      className="ga-btn" style={{width:"100%",marginTop:8,opacity:!restoreText.trim()?0.5:1}}>
                      <i className="ti ti-upload" aria-hidden="true" style={{fontSize:15}}></i>
                      Restaurar datos
                    </button>
                  </div>
                </div>
              )}
            </div>

            <p style={{fontSize:14,color:"#64748B",lineHeight:1.6,marginTop:0,marginBottom:14}}>
              Add your latest purchase to keep the forecast updated.
            </p>
            <div className="ga-add-pre">
              COMPRA: Sat 7 Jun 2026 - $380.00 - 72 items - No Frills Arnprior<br/>
              Diet Cola Bottles x2, Tortillas Original Medium x2, ...
            </div>
            <textarea className="ga-textarea" style={{minHeight:140}} value={newText}
              onChange={e=>setNewText(e.target.value)} placeholder="Paste your purchase text here..." />
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button className="ga-btn" style={{flex:1,opacity:!newText.trim()?0.5:1}}
                onClick={addPurchase} disabled={!newText.trim()}>
                <i className="ti ti-upload" aria-hidden="true" style={{fontSize:15}}></i>Add to history
              </button>
              {newText && <button className="ga-btn-sec" onClick={()=>setNewText("")}>Limpiar</button>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<GroceryApp />);
  </script>
</body>
</html>
